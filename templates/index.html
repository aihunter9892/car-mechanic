<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Torque — Car Mechanic Bot (Groq)</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <div class="logo">🚗</div>
        <div>
          <h1>Torque</h1>
          <p>Car Mechanic Bot • Groq • llama-3.3-70b-versatile</p>
        </div>
      </div>

      <div class="controls">
        <div class="control">
          <label for="temperature">Temperature</label>
          <input id="temperature" type="range" min="0" max="1.5" step="0.05" value="0.30"/>
          <span id="temperatureVal">0.30</span>
        </div>

        <div class="control">
          <label for="top_p">Top-P</label>
          <input id="top_p" type="range" min="0.1" max="1" step="0.05" value="0.90"/>
          <span id="topPVal">0.90</span>
        </div>

        <button id="clearBtn" class="btn secondary" type="button">Clear Chat</button>
      </div>
    </header>

    <main class="card">
      <div id="chat" class="chat">
        <div class="msg bot">
          <div class="bubble">
            Hi, I’m <b>Torque</b>. Tell me your symptoms + make/model/year (if you know).
          </div>
        </div>
      </div>

      <form id="form" class="composer">
        <input id="input" type="text" placeholder="Describe your issue… (e.g., ‘2017 Swift, engine light, rough idle’)"/>
        <button class="btn" type="submit">Send</button>
      </form>

      <div class="hint">
        Tip: Start with symptoms, then add context (warning lights, recent repairs, mileage).
      </div>
    </main>

    <footer class="footer">
      <span>Local demo • Keys stored in <code>.env</code></span>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
